name: Run install, format, lint, build, and test on every push

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies (root + all clients)
        # The root postinstall (scripts/install-clients.mjs) cascades
        # `npm install` into clients/web, clients/cli, clients/tui, and
        # clients/launcher, so this single step sets up every client.
        run: npm install

      - name: Check formatting
        working-directory: ./clients/web
        run: npm run format:check

      - name: Run linter
        working-directory: ./clients/web
        run: npm run lint

      - name: Run Build
        working-directory: ./clients/web
        run: npm run build

      - name: Run tests with coverage
        working-directory: ./clients/web
        run: npm run test:coverage

      - name: Validate CLI (format, lint, coverage)
        # Self-contained. In-process runCli() tests under v8 instrumentation + a
        # thin out-of-process E2E layer enforce the per-file gate for
        # clients/cli/src (#1484). The CLI's test:coverage builds the binary
        # first (its e2e spawns it), which also produces the bundle the smokes
        # need — so validate folds the build into test:coverage (no separate
        # build step).
        working-directory: ./clients/cli
        run: npm run validate

      - name: Validate TUI (format, lint, build, coverage)
        # Self-contained. The per-file coverage gate covers the TUI's non-React
        # logic modules (interim scope — see clients/tui/vitest.config.ts and
        # #1501); `build` produces the bundle the smoke needs.
        working-directory: ./clients/tui
        run: npm run validate

      - name: Validate launcher (format, lint, build, coverage)
        # Self-contained, with no dependency on the other clients being built.
        working-directory: ./clients/launcher
        run: npm run validate

      - name: Run cross-client smokes
        # End-to-end smokes through the built launcher (--help dispatch + prod
        # CLI/TUI/web). Not part of any client's `validate`: it needs the
        # cli/tui/launcher bundles, which the validate steps above already built
        # (smoke:web builds clients/web/dist on demand — #1486), so nothing is
        # built twice.
        run: npm run smoke

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('clients/web/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: ./clients/web
        run: npx playwright install --with-deps chromium

      - name: Run Storybook play-function tests
        working-directory: ./clients/web
        run: npm run test:storybook
