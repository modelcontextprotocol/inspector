<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="color-scheme" content="light dark" />
    <!-- Isolation model: the iframe `sandbox` attribute set on the inner
         frame below ("allow-scripts allow-same-origin allow-forms") and the
         parent-origin allowlist (ALLOWED_REFERRER_PATTERN +
         EXPECTED_HOST_ORIGIN check on incoming messages) are the structural
         isolation boundary. On top of that, network/resource egress from the
         inner document is constrained per app: the resource-ready handler
         below translates the UI resource's _meta.ui.csp into a
         `<meta http-equiv="Content-Security-Policy">` injected into the inner
         document before it loads (see buildCspContent). No CSP *header* is set
         by the sandbox controller; the per-document meta policy is the enforced
         network boundary. -->
    <title>MCP-UI Proxy</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100vh;
        width: 100vw;
        /* Transparent background allows parent page to show through */
        background-color: transparent;
      }
      body {
        display: flex;
        flex-direction: column;
      }
      * {
        box-sizing: border-box;
      }
      iframe {
        background-color: transparent;
        border: 0px none transparent;
        padding: 0px;
        overflow: hidden;
        flex-grow: 1;
        /* Inherit color scheme from parent for consistent transparency */
        color-scheme: inherit;
      }
    </style>
  </head>
  <body>
    <script>
      function buildAllowAttribute(permissions) {
        if (!permissions) return "";

        const allowList = [];
        if (permissions["camera"]) allowList.push("camera");
        if (permissions["microphone"]) allowList.push("microphone");
        if (permissions["geolocation"]) allowList.push("geolocation");
        if (permissions["clipboardWrite"]) allowList.push("clipboard-write");

        return allowList.join("; ");
      }

      // Translate the UI resource's _meta.ui.csp (McpUiResourceCsp) into a CSP
      // string enforced on the inner document. Per the MCP Apps spec the host
      // MUST apply this policy. The inner HTML is delivered inline (document.write
      // / srcdoc) into a sandboxed, server-less origin, so EVERY external origin
      // the app touches must be declared — and an omitted list means "deny".
      //
      //   connectDomains  -> connect-src                     (fetch/XHR/WebSocket)
      //   resourceDomains -> img/script/style/font/media-src  (static resources)
      //   frameDomains    -> frame-src                        (nested iframes)
      //   baseUriDomains  -> base-uri                         (document base URI)
      //
      // Secure defaults for omitted/empty lists: no connections, no external
      // resources, frame-src 'none', base-uri 'self'. script-src/style-src also
      // carry 'unsafe-inline' because the app's own inline <script>/<style> ship
      // with the HTML and have no origin to allowlist; external script/style
      // loads stay restricted to the declared resourceDomains.
      function buildCspContent(csp) {
        const c = csp || {};
        const list = (domains) =>
          Array.isArray(domains) && domains.length > 0
            ? domains.join(" ")
            : null;

        const resource = list(c.resourceDomains);
        const connect = list(c.connectDomains);
        const frame = list(c.frameDomains);
        const baseUri = list(c.baseUriDomains);

        const inlineResource = resource
          ? "'unsafe-inline' " + resource
          : "'unsafe-inline'";

        return [
          "connect-src " + (connect || "'none'"),
          "script-src " + inlineResource,
          "style-src " + inlineResource,
          "img-src " + (resource || "'none'"),
          "font-src " + (resource || "'none'"),
          "media-src " + (resource || "'none'"),
          "frame-src " + (frame || "'none'"),
          "base-uri " + (baseUri || "'self'"),
        ].join("; ");
      }

      // Insert the policy as the first <head> child so it precedes — and thus
      // governs — every resource the inner document loads. Falls back to wrapping
      // a <head>, or prepending, when the HTML omits one.
      function injectCsp(html, cspContent) {
        const meta =
          '<meta http-equiv="Content-Security-Policy" content="' +
          cspContent +
          '">';
        if (/<head[^>]*>/i.test(html)) {
          return html.replace(/<head[^>]*>/i, (m) => m + meta);
        }
        if (/<html[^>]*>/i.test(html)) {
          return html.replace(
            /<html[^>]*>/i,
            (m) => m + "<head>" + meta + "</head>",
          );
        }
        return meta + html;
      }

      const ALLOWED_REFERRER_PATTERN =
        /^http:\/\/(localhost|127\.0\.0\.1)(:|\/|$)/;

      if (window.self === window.top) {
        throw new Error("This file is only to be used in an iframe sandbox.");
      }

      if (!document.referrer) {
        throw new Error("No referrer, cannot validate embedding site.");
      }

      if (!document.referrer.match(ALLOWED_REFERRER_PATTERN)) {
        throw new Error(
          `Embedding domain not allowed in referrer ${document.referrer}. (Consider updating the validation logic to allow your domain.)`,
        );
      }

      // Extract the expected host origin from the referrer for origin validation.
      // This is the origin we expect all parent messages to come from.
      const EXPECTED_HOST_ORIGIN = new URL(document.referrer).origin;

      const OWN_ORIGIN = new URL(window.location.href).origin;

      // Security self-test: verify iframe isolation is working correctly.
      // This MUST throw a SecurityError -- if `window.top` is accessible, the sandbox
      // configuration is dangerously broken and untrusted content could escape.
      try {
        window.top?.alert(
          "If you see this, the sandbox is not setup securely.",
        );
        throw "FAIL";
      } catch (e) {
        if (e === "FAIL") {
          throw new Error("The sandbox is not setup securely.");
        }

        // Expected: SecurityError confirms proper sandboxing.
      }

      // Double-iframe sandbox architecture: THIS file is the outer sandbox proxy
      // iframe on a separate origin. It creates an inner iframe for untrusted HTML
      // content. Per the specification, the Host and the Sandbox MUST have different
      // origins.
      const inner = document.createElement("iframe");
      inner.style = "width:100%; height:100%; border:none;";
      inner.setAttribute(
        "sandbox",
        "allow-scripts allow-same-origin allow-forms",
      );
      // Note: allow attribute is set later when receiving sandbox-resource-ready notification
      // based on the permissions requested by the app
      document.body.appendChild(inner);

      const RESOURCE_READY_NOTIFICATION =
        "ui/notifications/sandbox-resource-ready";
      const PROXY_READY_NOTIFICATION = "ui/notifications/sandbox-proxy-ready";

      // Message relay: This Sandbox (outer iframe) acts as a bidirectional bridge,
      // forwarding messages between:
      //
      //   Host (parent window) ↔ Sandbox (outer frame) ↔ View (inner iframe)
      //
      // Reason: the parent window and inner iframe have different origins and can't
      // communicate directly, so the outer iframe forwards messages in both
      // directions to connect them.
      //
      // Special case: The "ui/notifications/sandbox-proxy-ready" message is
      // intercepted here (not relayed) because the Sandbox uses it to configure and
      // load the inner iframe with the view HTML content.
      //
      // Security: isolation comes from the iframe `sandbox` attribute and
      // the origin allowlist above. No CSP header is set on this page (see
      // the head comment); the sandbox attribute is the enforced boundary.

      window.addEventListener("message", async (event) => {
        if (event.source === window.parent) {
          // Validate that messages from parent come from the expected host origin.
          // This prevents malicious pages from sending messages to this sandbox.
          if (event.origin !== EXPECTED_HOST_ORIGIN) {
            console.error(
              "[Sandbox] Rejecting message from unexpected origin:",
              event.origin,
              "expected:",
              EXPECTED_HOST_ORIGIN,
            );
            return;
          }

          if (event.data && event.data.method === RESOURCE_READY_NOTIFICATION) {
            const { html, sandbox, permissions, csp } = event.data.params;
            if (typeof sandbox === "string") {
              inner.setAttribute("sandbox", sandbox);
            }
            // Set Permission Policy allow attribute if permissions are requested
            const allowAttribute = buildAllowAttribute(permissions);
            if (allowAttribute) {
              console.log("[Sandbox] Setting allow attribute:", allowAttribute);
              inner.setAttribute("allow", allowAttribute);
            }
            if (typeof html === "string") {
              // Enforce the app's declared CSP (with secure defaults) by injecting
              // a <meta http-equiv> before any of the inner document's content
              // loads. Always applied — a resource that declares no csp still gets
              // the locked-down secure defaults.
              const securedHtml = injectCsp(html, buildCspContent(csp));
              // Use document.write instead of srcdoc (which the CesiumJS Map won't work with)
              const doc =
                inner.contentDocument || inner.contentWindow?.document;
              if (doc) {
                doc.open();
                doc.write(securedHtml);
                doc.close();
              } else {
                // Fallback to srcdoc if document is not accessible
                console.warn(
                  "[Sandbox] document.write not available, falling back to srcdoc",
                );
                inner.srcdoc = securedHtml;
              }
            }
          } else {
            if (inner && inner.contentWindow) {
              inner.contentWindow.postMessage(event.data, "*");
            }
          }
        } else if (event.source === inner.contentWindow) {
          if (event.origin !== OWN_ORIGIN) {
            console.error(
              "[Sandbox] Rejecting message from inner iframe with unexpected origin:",
              event.origin,
              "expected:",
              OWN_ORIGIN,
            );
            return;
          }
          // Relay messages from inner frame to parent window.
          // Use specific origin instead of "*" to prevent message interception.
          window.parent.postMessage(event.data, EXPECTED_HOST_ORIGIN);
        }
      });

      // Notify the Host that the Sandbox is ready to receive view HTML.
      // Use specific origin instead of "*" to ensure only the expected host receives this.
      window.parent.postMessage(
        {
          jsonrpc: "2.0",
          method: PROXY_READY_NOTIFICATION,
          params: {},
        },
        EXPECTED_HOST_ORIGIN,
      );
    </script>
  </body>
</html>
