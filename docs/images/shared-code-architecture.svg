<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700">
  <defs>
    <style>
      .box { fill: #f8f9fa; stroke: #333; stroke-width: 2; rx: 5; }
      .core { fill: #e1f5ff; stroke: #0066cc; stroke-width: 2; }
      .ui { fill: #fff4e1; stroke: #cc8800; stroke-width: 2; }
      .sdk { fill: #e1ffe1; stroke: #00cc00; stroke-width: 2; }
      .server { fill: #f0e1ff; stroke: #6600cc; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
      .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #333; }
      .diagram-title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #888; }
      .small { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
      .arrow { stroke: #888; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#888" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="diagram-title">MCP Inspector Architecture</text>

  <!-- User Interfaces (spaced out) -->
  <rect x="125" y="60" width="150" height="80" class="ui" />
  <text x="200" y="85" text-anchor="middle" class="title">CLI</text>
  <text x="200" y="105" text-anchor="middle" class="small">Workspace</text>

  <rect x="425" y="60" width="150" height="80" class="ui" />
  <text x="500" y="85" text-anchor="middle" class="title">TUI</text>
  <text x="500" y="105" text-anchor="middle" class="small">Workspace</text>
  <text x="500" y="120" text-anchor="middle" class="small">React + Ink</text>

  <rect x="725" y="60" width="150" height="80" class="ui" />
  <text x="800" y="85" text-anchor="middle" class="title">Web Client</text>
  <text x="800" y="105" text-anchor="middle" class="small">Workspace</text>
  <text x="800" y="120" text-anchor="middle" class="small">React</text>

  <!-- Inspector Core (main box; extra left/right padding) -->
  <rect x="260" y="180" width="480" height="320" class="core" />
  <text x="500" y="205" text-anchor="middle" class="title">Inspector Core</text>
  <text x="500" y="222" text-anchor="middle" class="small">@modelcontextprotocol/inspector-core</text>

  <!-- Internal: React Hooks (narrower, right-aligned with InspectorClient) -->
  <rect x="440" y="238" width="260" height="50" class="box" />
  <text x="570" y="265" text-anchor="middle" class="title">React Hooks</text>
  <text x="570" y="280" text-anchor="middle" class="small">useInspectorClient, usePagedTools, …</text>

  <!-- Internal: State Managers (narrower, right-aligned with InspectorClient) -->
  <rect x="440" y="338" width="260" height="50" class="box" />
  <text x="570" y="365" text-anchor="middle" class="title">State Managers</text>
  <text x="570" y="380" text-anchor="middle" class="small">PagedToolsState, MessageLogState, …</text>

  <!-- Internal: InspectorClient (full width) -->
  <rect x="300" y="438" width="400" height="50" class="box" />
  <text x="500" y="465" text-anchor="middle" class="title">InspectorClient</text>
  <text x="500" y="480" text-anchor="middle" class="small">Protocol layer, connection, events, MCP method wrappers</text>

  <!-- MCP SDK (moved in toward center) -->
  <rect x="100" y="550" width="200" height="100" class="sdk" />
  <text x="200" y="575" text-anchor="middle" class="title">MCP SDK</text>
  <rect x="120" y="585" width="160" height="25" class="box" />
  <text x="200" y="602" text-anchor="middle" class="text">Client</text>
  <rect x="120" y="615" width="160" height="25" class="box" />
  <text x="200" y="632" text-anchor="middle" class="text">Transports</text>

  <!-- MCP Server (moved in toward center) -->
  <rect x="650" y="550" width="200" height="100" class="server" />
  <text x="750" y="575" text-anchor="middle" class="title">MCP Server</text>
  <text x="750" y="600" text-anchor="middle" class="small">External</text>
  <text x="750" y="615" text-anchor="middle" class="small">stdio/SSE/HTTP</text>

  <!-- Arrows inside Inspector Core: Hooks → State Managers → InspectorClient (visible gaps) -->
  <line x1="570" y1="288" x2="570" y2="338" class="arrow" />
  <line x1="570" y1="388" x2="570" y2="438" class="arrow" />

  <!-- CLI → State Managers (exit right) and InspectorClient (exit left, enter at left-edge midpoint); exits center±10 like Web -->
  <path d="M 210 140 L 210 363 L 440 363" class="arrow" fill="none" />
  <path d="M 190 140 L 190 463 L 300 463" class="arrow" fill="none" />

  <!-- TUI → React Hooks and InspectorClient (exit left/right same distance, turn down, enter boxes as vertical) -->
  <path d="M 425 113 L 375 113 L 375 438" class="arrow" fill="none" />
  <path d="M 575 113 L 625 113 L 625 238" class="arrow" fill="none" />

  <!-- Web → React Hooks and InspectorClient (mirror of CLI: down then left, enter at right-edge midpoints) -->
  <path d="M 790 140 L 790 263 L 700 263" class="arrow" fill="none" />
  <path d="M 810 140 L 810 463 L 700 463" class="arrow" fill="none" />

  <!-- InspectorClient → MCP SDK (orthogonal; from midpoint of InspectorClient bottom) -->
  <path d="M 500 488 L 500 520 L 200 520 L 200 550" class="arrow" fill="none" />

  <!-- MCP SDK → MCP Server -->
  <line x1="300" y1="600" x2="650" y2="600" class="arrow" />
</svg>
